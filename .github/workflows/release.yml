name: Release Multi-platform Products

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with fyne-cross
        run: |
          # Linux (amd64 + arm64) → tar.gz
          fyne-cross linux --arch=amd64,arm64 --app-id multi-platform-products --icon myicon.png --name "Multi-platform Products" --output dist

          # Windows (amd64) → zip
          #fyne-cross windows --arch=amd64 --app-id multi-platform-products --icon myicon.png --name "Multi-platform Products" --output dist

          # macOS (universal amd64+arm64) → zip
          #fyne-cross darwin --arch=amd64,arm64 --app-id multi-platform-products --icon myicon.png --name "Multi-platform Products" --output dist

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          mv fyne-cross/dist/*/*.tar.gz artifacts/ 2>/dev/null || true
          mv fyne-cross/dist/*/*.zip artifacts/ 2>/dev/null || true
          # 可选：重命名文件更友好（或保持原样）
          for f in artifacts/*; do
            if [[ -f "$f" ]]; then
              newname=$(echo "$f" | sed 's/\(.*\)\./multi-platform-products-\1-v${{ github.ref_name }}./')
              mv "$f" "$newname" || true
            fi
          done

      - name: Run GoReleaser to create release & upload
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}