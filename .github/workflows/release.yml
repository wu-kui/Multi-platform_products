name: Release Multi-platform Products

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'  # 改为 1.24 以兼容 fyne-cross 镜像（如果你的 go.mod 已降级）

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build with fyne-cross
        run: |
          echo "fyne-cross version:"
          fyne-cross version || true

          echo "Go version:"
          go version

          # Linux
          fyne-cross linux --arch=amd64,arm64 \
            --app-id com.wukui.multiplatformproducts \
            --icon myicon.png \
            --name "Multi-platform Products" \
            --output dist \
            --no-cache

          # Windows（这里是报错的地方，必须改）
          fyne-cross windows --arch=amd64 \
            --app-id com.wukui.multiplatformproducts \
            --icon myicon.png \
            --name "Multi-platform Products" \
            --output dist \
            --no-cache

          # macOS
          fyne-cross darwin --arch=amd64,arm64 \
            --app-id com.wukui.multiplatformproducts \
            --icon myicon.png \
            --name "Multi-platform Products" \
            --output dist \
            --no-cache
      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          mv fyne-cross/dist/*/*.tar.gz artifacts/ 2>/dev/null || true
          mv fyne-cross/dist/*/*.zip artifacts/ 2>/dev/null || true
          # 重命名文件（可选，但让文件名更友好）
          for f in artifacts/*; do
            if [[ -f "$f" ]]; then
              newname=$(echo "$f" | sed "s/\(.*\)\./multi-platform-products-\1-v${{ github.ref_name }}./")
              mv "$f" "$newname" || true
            fi
          done
          ls -la artifacts/  # 调试：列出生成的文件

      - name: Run GoReleaser to create release & upload
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}